name: CD - Publish MSIX

on:
  push:
    branches: [ "main" ]

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish MSIX
        run: dotnet publish -c Release -r win-x64 -p:GenerateAppxPackageOnBuild=true -p:AppxPackageSigningEnabled=false
      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: packaged-app
          path: bin/Release/**/publish/**/*.msix
